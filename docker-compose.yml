# Production stack: web (FastAPI + static React) + Telegram bot + Caddy (HTTPS).
# Run on the VPS with:  docker compose up -d
services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_PATH: /data/app.db
    expose:
      - "8000"
    volumes:
      - db-data:/data

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_PATH: /data/app.db
    command: ["python", "bot.py"]
    volumes:
      - db-data:/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web

volumes:
  db-data:
  caddy-data:
  caddy-config:
